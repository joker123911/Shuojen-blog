name: Deploy and Ping Hub

on:
  push:
    branches:
      - main # 如果你的主分支叫 master，這裡請改成 master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build website
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
          # 這裡會幫你推送到 gh-pages 分支
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'

      - name: Ping WebSub Hub
        run: |
          curl -X POST https://pubsubhubbub.appspot.com/publish \
          -d "hub.mode=publish" \
          -d "hub.url=https://shuojen.com/blog/rss.xml"
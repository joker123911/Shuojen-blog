<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>螢幕像素取色工具</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            width: 350px;
        }
        h2 { margin-bottom: 1.5rem; color: #333; }
        #colorPreview {
            width: 100px;
            height: 100px;
            margin: 0 auto 1.5rem;
            border-radius: 50%;
            border: 4px solid #fff;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            background-color: #ddd;
            transition: background-color 0.3s ease;
        }
        .info {
            font-size: 1.2rem;
            margin-bottom: 1rem;
            font-family: monospace;
            color: #555;
        }
        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #0056b3;
        }
        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
        .error {
            color: #ff4d4d;
            margin-top: 10px;
            font-size: 0.9rem;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>像素取色器</h2>
    <div id="colorPreview"></div>
    <div class="info" id="hexValue">#DDDDDD</div>
    <div class="info" id="rgbValue">rgb(221, 221, 221)</div>
    <button id="pickBtn">開始取色</button>
    <p id="errorMsg" class="error">抱歉，您的瀏覽器不支援 EyeDropper API</p>
</div>

<script>
    const pickBtn = document.getElementById('pickBtn');
    const colorPreview = document.getElementById('colorPreview');
    const hexValue = document.getElementById('hexValue');
    const rgbValue = document.getElementById('rgbValue');
    const errorMsg = document.getElementById('errorMsg');

    // 檢查瀏覽器是否支援 EyeDropper API
    if (!window.EyeDropper) {
        errorMsg.style.display = 'block';
        pickBtn.disabled = true;
    } else {
        const eyeDropper = new EyeDropper();

        pickBtn.addEventListener('click', () => {
            eyeDropper.open().then(result => {
                const colorHex = result.sRGBHex;
                
                // 更新顏色預覽與數值
                colorPreview.style.backgroundColor = colorHex;
                hexValue.innerText = colorHex.toUpperCase();
                
                // 轉換 HEX 為 RGB 顯示
                const r = parseInt(colorHex.slice(1, 3), 16);
                const g = parseInt(colorHex.slice(3, 5), 16);
                const b = parseInt(colorHex.slice(5, 7), 16);
                rgbValue.innerText = `rgb(${r}, ${g}, ${b})`;
                
                // 自動複製到剪貼簿
                navigator.clipboard.writeText(colorHex);
            }).catch(e => {
                console.log("使用者取消了取色或發生錯誤");
            });
        });
    }
</script>

</body>
</html>

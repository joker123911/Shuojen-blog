<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>影音格式轉換器 | Shuojen.com</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { fontFamily: { sans: ['"Noto Sans TC"', 'sans-serif'], } } }
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.10/dist/umd/ffmpeg.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@ffmpeg/util@0.12.1/dist/umd/index.js"></script>

    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f8fafc; border-radius: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4 custom-scrollbar">

    <div class="max-w-5xl w-full bg-white rounded-[2rem] shadow-2xl border border-slate-100 p-6 md:p-10 fade-in flex flex-col h-full min-h-[600px]">
        
        <header class="flex flex-col md:flex-row items-center md:items-start gap-5 mb-8 text-center md:text-left">
            <div class="w-12 h-12 rounded-2xl bg-indigo-50 shadow-lg shadow-indigo-200 flex items-center justify-center shrink-0">
                <i class="fa-solid fa-file-audio text-indigo-600 text-xl"></i>
            </div>
            <div>
                <h1 class="text-2xl font-bold text-slate-800">影音格式轉換器 (WASM版)</h1>
                <p class="text-slate-500 text-sm mt-1">在瀏覽器本地真實將影片提取為音訊，不需上傳伺服器</p>
            </div>
        </header>

        <main class="flex-1 custom-scrollbar overflow-y-auto pr-2">
            
            <div id="uploadArea" class="border-2 border-dashed border-indigo-100 rounded-xl bg-indigo-50/30 hover:bg-indigo-50 hover:border-indigo-300 transition-all p-10 flex flex-col items-center justify-center cursor-pointer group mb-6 relative">
                <input type="file" id="fileInput" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" accept="video/*,audio/*">
                <div class="w-16 h-16 rounded-full bg-white shadow-sm flex items-center justify-center mb-4 group-hover:scale-110 transition-transform">
                    <i class="fa-solid fa-cloud-arrow-up text-indigo-500 text-2xl"></i>
                </div>
                <p class="text-slate-800 font-medium mb-1">點擊或拖曳檔案至此</p>
                <p class="text-slate-400 text-sm">請選擇 100MB 以下的影片以確保瀏覽器效能</p>
            </div>

            <div id="settingsArea" class="hidden fade-in space-y-6 mb-6">
                <div class="flex items-center justify-between p-4 bg-white border border-slate-100 rounded-xl hover:border-indigo-300 transition-all shadow-sm">
                    <div class="flex items-center gap-4 overflow-hidden">
                        <div class="w-10 h-10 rounded-lg bg-emerald-50 text-emerald-500 flex items-center justify-center shrink-0">
                            <i class="fa-solid fa-file-video"></i>
                        </div>
                        <div class="truncate">
                            <p id="fileName" class="text-slate-800 font-medium truncate">video_source.mp4</p>
                            <p id="fileSize" class="text-slate-400 text-xs mt-0.5">24.5 MB</p>
                        </div>
                    </div>
                    <button id="removeFileBtn" class="w-8 h-8 rounded-full hover:bg-slate-100 text-slate-400 hover:text-orange-500 transition-colors flex items-center justify-center">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                </div>

                <div>
                    <h3 class="text-slate-800 font-medium mb-3 text-sm">選擇輸出格式</h3>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                        <label class="cursor-pointer">
                            <input type="radio" name="format" value="wav" class="peer sr-only" checked>
                            <div class="p-3 text-center border border-slate-100 rounded-xl text-slate-500 peer-checked:border-indigo-600 peer-checked:bg-indigo-50 peer-checked:text-indigo-700 hover:border-indigo-300 transition-all">
                                <span class="font-bold">WAV</span>
                                <div class="text-[10px] mt-1 opacity-70">無損音質</div>
                            </div>
                        </label>
                        <label class="cursor-pointer">
                            <input type="radio" name="format" value="mp3" class="peer sr-only">
                            <div class="p-3 text-center border border-slate-100 rounded-xl text-slate-500 peer-checked:border-indigo-600 peer-checked:bg-indigo-50 peer-checked:text-indigo-700 hover:border-indigo-300 transition-all">
                                <span class="font-bold">MP3</span>
                                <div class="text-[10px] mt-1 opacity-70">高相容性</div>
                            </div>
                        </label>
                    </div>
                </div>

                <button id="convertBtn" class="w-full py-3.5 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl font-medium shadow-lg shadow-indigo-200 transition-all flex items-center justify-center gap-2">
                    <i class="fa-solid fa-wand-magic-sparkles"></i>
                    <span>開始真實轉換</span>
                </button>
            </div>

            <div id="progressArea" class="hidden fade-in space-y-4 mb-6">
                <div class="p-6 bg-white border border-slate-100 rounded-xl shadow-sm">
                    <div class="flex justify-between items-end mb-2">
                        <div>
                            <p id="statusText" class="text-slate-800 font-medium">準備引擎中，請稍候...</p>
                            <p id="statusSubtext" class="text-slate-400 text-xs mt-1">這可能需要幾十秒鐘</p>
                        </div>
                        <span id="progressPercentage" class="text-indigo-600 font-bold text-lg">0%</span>
                    </div>
                    <div class="w-full bg-slate-100 rounded-full h-2.5 overflow-hidden">
                        <div id="progressBar" class="bg-indigo-600 h-2.5 rounded-full transition-all duration-300" style="width: 0%"></div>
                    </div>
                </div>

                <div id="downloadArea" class="hidden fade-in">
                    <div class="p-4 bg-emerald-50 border border-emerald-100 rounded-xl flex items-center justify-between">
                        <div class="flex items-center gap-3">
                            <i class="fa-solid fa-circle-check text-emerald-500 text-xl"></i>
                            <span class="text-emerald-700 font-medium">轉換完成！</span>
                        </div>
                        <a id="downloadBtn" href="#" download="output.wav" class="px-5 py-2 bg-emerald-500 hover:bg-emerald-600 text-white rounded-lg text-sm font-medium transition-colors shadow-md shadow-emerald-200 flex items-center">
                            <i class="fa-solid fa-download mr-2"></i> 下載檔案
                        </a>
                    </div>
                </div>
            </div>

        </main>

        <footer class="mt-8 pt-4 border-t border-slate-100 flex flex-col md:flex-row items-center justify-between gap-4 shrink-0">
            <div class="text-slate-400 text-sm">
                © Shuojen.com 影音格式轉換器
            </div>
            <button id="resetBtn" class="text-sm text-slate-500 hover:text-slate-800 flex items-center gap-2 transition-colors px-3 py-1.5 rounded-lg hover:bg-slate-50">
                <i class="fa-solid fa-rotate-right"></i>
                重置工具
            </button>
        </footer>
    </div>

    <script>
        const { FFmpeg } = window.FFmpeg;
        const { fetchFile } = window.FFmpegUtil;
        let ffmpeg = null;
        let selectedFile = null;

        // UI 元素
        const fileInput = document.getElementById('fileInput');
        const uploadArea = document.getElementById('uploadArea');
        const settingsArea = document.getElementById('settingsArea');
        const progressArea = document.getElementById('progressArea');
        const downloadArea = document.getElementById('downloadArea');
        const downloadBtn = document.getElementById('downloadBtn');
        const statusText = document.getElementById('statusText');
        const statusSubtext = document.getElementById('statusSubtext');
        const progressBar = document.getElementById('progressBar');
        const progressPercentage = document.getElementById('progressPercentage');

        // 格式化檔案大小
        function formatBytes(bytes) {
            if (!+bytes) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return `${parseFloat((bytes / Math.pow(k, i)).toFixed(2))} ${sizes[i]}`;
        }

        // 選擇檔案
        fileInput.addEventListener('change', (e) => {
            selectedFile = e.target.files[0];
            if (selectedFile) {
                document.getElementById('fileName').textContent = selectedFile.name;
                document.getElementById('fileSize').textContent = formatBytes(selectedFile.size);
                uploadArea.classList.add('hidden');
                settingsArea.classList.remove('hidden');
                settingsArea.classList.add('fade-in');
            }
        });

        document.getElementById('removeFileBtn').addEventListener('click', () => { resetTool(); });
        document.getElementById('resetBtn').addEventListener('click', () => { resetTool(); });

        // 真實轉檔執行
        document.getElementById('convertBtn').addEventListener('click', async () => {
            if (!selectedFile) return;

            // 取得目標格式 (wav 或 mp3)
            const targetFormat = document.querySelector('input[name="format"]:checked').value;
            const outputFileName = `output.${targetFormat}`;

            // UI 切換至進度條
            settingsArea.classList.add('hidden');
            progressArea.classList.remove('hidden');
            progressArea.classList.add('fade-in');

            try {
                // 1. 初始化 FFmpeg (如果尚未載入)
                if (!ffmpeg) {
                    statusText.textContent = "正在下載並初始化轉檔引擎...";
                    ffmpeg = new FFmpeg();
                    
                    // 綁定進度條更新
                    ffmpeg.on('progress', ({ progress }) => {
                        const percent = Math.round(progress * 100);
                        // FFmpeg progress 有時會超過 1 或小於 0，做個保護
                        if (percent >= 0 && percent <= 100) {
                            progressBar.style.width = `${percent}%`;
                            progressPercentage.textContent = `${percent}%`;
                            statusText.textContent = `正在編碼 ${targetFormat.toUpperCase()} 檔案...`;
                            statusSubtext.textContent = "請保持視窗開啟，這會消耗 CPU 資源";
                        }
                    });

                    await ffmpeg.load({
                        coreURL: "https://cdn.jsdelivr.net/npm/@ffmpeg/core@0.12.6/dist/umd/ffmpeg-core.js",
                        wasmURL: "https://cdn.jsdelivr.net/npm/@ffmpeg/core@0.12.6/dist/umd/ffmpeg-core.wasm"
                    });
                }

                // 2. 將使用者的檔案寫入 FFmpeg 的虛擬記憶體中
                statusText.textContent = "正在讀取檔案至記憶體...";
                await ffmpeg.writeFile('input_video', await fetchFile(selectedFile));

                // 3. 執行 FFmpeg 指令 (將 input_video 轉出)
                statusText.textContent = "開始轉檔...";
                statusSubtext.textContent = "轉換速度取決於您的電腦效能";
                
                // 針對不同格式下不同參數 (為求穩定，這裡使用基礎指令)
                if(targetFormat === 'mp3') {
                    await ffmpeg.exec(['-i', 'input_video', '-q:a', '0', '-map', 'a', outputFileName]);
                } else {
                    await ffmpeg.exec(['-i', 'input_video', outputFileName]);
                }

                // 4. 從虛擬記憶體讀取轉好的檔案
                statusText.textContent = "打包下載檔案中...";
                const fileData = await ffmpeg.readFile(outputFileName);
                const dataArray = new Uint8Array(fileData.buffer);
                
                // 5. 產生 Blob 並綁定至下載按鈕
                const mimeType = targetFormat === 'mp3' ? 'audio/mpeg' : 'audio/wav';
                const blob = new Blob([dataArray], { type: mimeType });
                const blobUrl = URL.createObjectURL(blob);

                downloadBtn.href = blobUrl;
                downloadBtn.download = `${selectedFile.name.split('.')[0]}_converted.${targetFormat}`;

                // 更新 UI：完成狀態
                statusText.textContent = "處理完成！";
                statusText.classList.remove('text-slate-800');
                statusText.classList.add('text-emerald-600');
                statusSubtext.textContent = "您可以點擊下方按鈕下載檔案";
                progressBar.style.width = '100%';
                progressPercentage.textContent = '100%';
                downloadArea.classList.remove('hidden');

            } catch (error) {
                console.error(error);
                statusText.textContent = "轉檔發生錯誤！";
                statusText.classList.add('text-orange-500');
                statusSubtext.textContent = "可能是檔案過大或不支援的格式。請打開主控台(F12)查看錯誤訊息。";
            }
        });

        // 恢復預設值
        function resetTool() {
            fileInput.value = '';
            selectedFile = null;
            uploadArea.classList.remove('hidden');
            uploadArea.classList.add('fade-in');
            settingsArea.classList.add('hidden');
            progressArea.classList.add('hidden');
            downloadArea.classList.add('hidden');
            
            progressBar.style.width = '0%';
            progressPercentage.textContent = '0%';
            statusText.textContent = "準備引擎中，請稍候...";
            statusText.classList.remove('text-emerald-600', 'text-orange-500');
            statusText.classList.add('text-slate-800');
            statusSubtext.textContent = "這可能需要幾十秒鐘";
        }
    </script>
</body>
</html>
